<style>
/* ============================================================
   COLOR SYSTEM & GLOBAL STYLES
   ============================================================ */
:root {
  --bg: #E8E4D8;
  --fg: #1F2419;
  --accent: #6B7F4A;
  --muted: #9C9889;

  --step-0: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --step-1: clamp(1.25rem, 1.15rem + 0.5vw, 1.5rem);
  --step-2: clamp(1.563rem, 1.39rem + 0.85vw, 2rem);
  --step-3: clamp(1.953rem, 1.68rem + 1.36vw, 2.67rem);
  --step-4: clamp(2.441rem, 2.02rem + 2.1vw, 3.55rem);
  --step-5: clamp(3.052rem, 2.42rem + 3.16vw, 4.74rem);
  --step-display: clamp(4rem, 13vw, 14rem);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: auto; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Inter', sans-serif;
  font-size: var(--step-0);
  line-height: 1.5;
  overflow-x: hidden;
  cursor: none;
}

/* Custom Cursor & Scroll Depth indicator */
.cursor-dot, .cursor-ring {
  position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%); mix-blend-mode: difference; border-radius: 50%;
}
.cursor-dot { width: 6px; height: 6px; background: var(--fg); }
.cursor-ring { width: 40px; height: 40px; border: 1px solid var(--fg); transition: width .3s, height .3s; }
